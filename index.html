textarea{

.container{

}

  width:100%;

.form-container{
  position:absolute;
  top:0;left:0;

}
  .form-field {
    position: absolute;
    font-size: 18px;
    border: none;
    background-color: rgba(255, 255, 255, 0.7);
    resize: none;
    overflow: hidden;
    padding: 0;
    margin: 0;
    text-align: center;
    outline: none;
    scrollbar-width: none;  /* Firefox */
    -ms-overflow-style: none; /* IE 10+ */
  }
  .form-field::-webkit-scrollbar {
    display: none; /* Chrome, Safari, Opera */
  }

.controls{
  width:1123px;
  margin:10px auto;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
 }
  textarea::placeholder {
    color: lightsteelblue;
    opacity: 1;
 }

#filename{
  flex:none;
  width:480px;
  padding:4px 8px;
  font-size:16px;
  text-align:center;
}

.bottom-controls{
  width:100%;
  display:flex;
  justify-content:center;
  gap:10px;
  margin:10px 0;
  margin-bottom: 100px
}

.card-lane{
  position:relative;
  width:1587px;
  height:1150px;
  margin:auto;
}

.card-group{
  position:absolute;
  border:2px solid #000;
  padding:6px;
  background:#fafafa;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
}

.clone-box{
  width:100%;
  height:50px;
  margin-bottom:6px;
  text-align:center;
}

.fixed-header {
  padding: 8px;
  text-align: center;
  font-weight: bold;
}

.card-row{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  min-height:70px;
  justify-content:center;
}

.card-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
}

.card{
  width:120px;
  height:160px;
  border:1px solid #000;
  box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
  border:2px solid #000;
}

.card-controls{
  display:flex;
  gap:0px;
}

.drag-handle{
  background:#ccc;
  padding:2px 6px;
  cursor:grab;
}

:root{
  --control-height: 18px;
}

.drag-handle,
.delete-btn{
  height: var(--control-height);
}

#editorModal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

#editorTextarea{
  width:515px;
  height:728px;
  font-size:18px;
}
</style>

function genId(){
  return "c-" + Date.now() + "-" + Math.random();
}

function dl(text, ext){
  const blob = new Blob([text], {type:"text/plain"});
  const a = document.createElement("a");
  const name = filenameInput?.value || "名称未設定";
  a.href = URL.createObjectURL(blob);

}

function saveBoardState() {
  const groupsData = [];
  document.querySelectorAll(".card-group").forEach(group => {
    const clone = group.querySelector(".clone-box");
    const row = group.querySelector(".card-row");
    
    const g = {
      id: group.dataset.groupId,
      top: group.style.top,
      left: group.style.left,
      width: group.style.width,
      height: group.style.height,
      source: clone?.dataset.source || null,
      cards: []
    };

    row.querySelectorAll(".card-wrap").forEach(wrap => {
      const card = wrap.querySelector(".card");
      g.cards.push({ id: wrap.dataset.id, value: card.value });
    });
    groupsData.push(g);
  });
  localStorage.setItem("boardState", JSON.stringify(groupsData));
}

function createCard(row, val = "", id = null){
  const wrap = document.createElement("div");
  wrap.className = "card-wrap";
  wrap.dataset.id = id || genId();
  wrap.ondragover = e => e.preventDefault();

  const card = document.createElement("textarea");
  card.className = "card";
  card.value = val;

  card.onmousedown = e => {
    e.preventDefault();
    openEditor(card);
  };
  card.oninput = saveBoardState;

  const ctr = document.createElement("div");
  ctr.className = "card-controls";

  const leftHandle = document.createElement("div");
  const rightHandle = document.createElement("div");
  const deleteBtn = document.createElement("button");

  leftHandle.className = "drag-handle";
  rightHandle.className = "drag-handle";
  leftHandle.textContent = "　 　";
  rightHandle.textContent = "　 　";
  deleteBtn.textContent = "×";

  deleteBtn.onclick = () => {
    const currentRow = wrap.parentNode;
    if(currentRow.querySelectorAll(".card-wrap").length <= 1) return;
    wrap.remove();
    saveBoardState();
  };

  leftHandle.draggable = true;
  rightHandle.draggable = true;

  const handleDragStart = e => {
    const currentRow = wrap.parentNode;
    if(currentRow.querySelectorAll(".card-wrap").length <= 1){
      e.preventDefault();
      return;
    }
    dragged = wrap;
    e.dataTransfer.setData("text/plain", "");
  };

  leftHandle.ondragstart = handleDragStart;
  rightHandle.ondragstart = handleDragStart;

  const handleDrop = (e, insertBeforeEl) => {
    e.preventDefault();
    e.stopPropagation(); 
    if(!dragged || dragged === wrap) return;

    const sourceRow = dragged.parentNode;
    if (sourceRow !== wrap.parentNode && sourceRow.querySelectorAll(".card-wrap").length <= 1) {
      return; 
    }

    wrap.parentNode.insertBefore(dragged, insertBeforeEl);
    saveBoardState();
  };

  leftHandle.ondragover = e => e.preventDefault();
  leftHandle.ondrop = e => handleDrop(e, wrap);

  rightHandle.ondragover = e => e.preventDefault();
  rightHandle.ondrop = e => handleDrop(e, wrap.nextSibling);

  ctr.append(leftHandle, deleteBtn, rightHandle);
  wrap.append(ctr, card);
  row.appendChild(wrap);
}

function enableDrop(row){
  row.ondragover = e => e.preventDefault();
  row.ondrop = e => {
    e.preventDefault();
    if(!dragged) return;

    const sourceRow = dragged.parentNode;
    if (sourceRow !== row && sourceRow.querySelectorAll(".card-wrap").length <= 1) {
      return;
    }

    row.appendChild(dragged);
    dragged = null;
    saveBoardState();
  };
}

function init(){
  const lane = document.getElementById("cardLane");
  lane.innerHTML = "";

  const savedStateStr = localStorage.getItem("boardState");

  if (savedStateStr) {
    const savedGroups = JSON.parse(savedStateStr);
    savedGroups.forEach(g => buildGroupDom(lane, g, true));
  } else {
    cardGroupsConfig.forEach(g => buildGroupDom(lane, g, false));
    saveBoardState(); 
  }
}

function buildGroupDom(lane, g, isRestore) {
  const group = document.createElement("div");
  group.className = "card-group";
  if (g.id) group.dataset.groupId = g.id;

  group.style.top = g.top + (isRestore ? "" : "px");
  group.style.left = g.left + (isRestore ? "" : "px");
  group.style.width = g.width + (isRestore ? "" : "px");
  group.style.height = g.height + (isRestore ? "" : "px");

  const row = document.createElement("div");
  row.className = "card-row";
  enableDrop(row);

  if (g.source) {
    const clone = document.createElement("textarea");
    clone.className = "clone-box";
    clone.dataset.source = g.source;

    const src = document.getElementById(g.source);
    clone.value = src?.value || "";

    clone.oninput = () => {
      if (src) {
        src.value = clone.value;
        localStorage.setItem(src.id, clone.value);
      }
    };
    group.appendChild(clone);
  } else {
    const fixedHeader = document.createElement("div");
    fixedHeader.className = "fixed-header";
    fixedHeader.textContent = "サブプロット（未整理）"; 
    group.appendChild(fixedHeader);
  }

  if (isRestore) {
    (g.cards || []).forEach(c => createCard(row, c.value || "", c.id || null));
  } else {
    const cloneVal = g.source ? document.getElementById(g.source)?.value || "" : "";
    for (let i = 0; i < g.cardCount; i++) {
      createCard(row, cloneVal);
    }
  }

  group.appendChild(row);
  lane.appendChild(group);
}

function addCard(){
  const groups = document.querySelectorAll(".card-group");
  if(groups.length === 0) return;
  const g = groups[groups.length - 1];
  createCard(g.querySelector(".card-row"), "");
  saveBoardState();
}

  groups.forEach(group => {
    group.querySelectorAll(".card").forEach(c => {
      const val = c.value.trim();
      if(val){

        t += `${val}\n\n`;
      }
    });
  });
  
  dl(t, "_トリートメント.txt");
}

  dl(JSON.stringify(data, null, 2), ".grg");
};

importBtn.onclick = () => importFile.click();

importFile.onchange = e => {
  const f = e.target.files[0];
  if (!f) return;
  
  if (filenameInput) {
    const baseName = f.name.replace(/\.[^/.]+$/, "");
    filenameInput.value = baseName;
    localStorage.setItem("filename", baseName);
  }

  const r = new FileReader();
  r.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      
      // fields復元
      Object.entries(data.fields || {}).forEach(([k, v]) => {
        const el = document.getElementById(k);
        if (el) {
          el.value = v;
          localStorage.setItem(k, v);
        }
      });
      
      const lane = document.getElementById("cardLane");
      lane.innerHTML = "";
      
      (data.groups || []).forEach(g => buildGroupDom(lane, g, true));
      saveBoardState(); 
      
    } catch (err) {
      console.error(err);
      alert("読み込みエラー");
    }
  };
  r.readAsText(f);
};

resetBtn.onclick = () => {
  if(!confirm("消去しますか？")) return;
  
  fieldsConfig.forEach(f => {
    localStorage.removeItem(f.id);
    const el = document.getElementById(f.id);
    if(el) el.value = "";
  });
  localStorage.removeItem("boardState");
  localStorage.removeItem("filename");
  
  init();
};

window.onload = init;

</script>
</body>
</html>
