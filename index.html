<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>girigram</title>

<!-- giri-gram: 儀理図 -->

<style>
  body {
    font-family: "Hiragino Mincho ProN", sans-serif;
    margin: 0;
    padding: 0;
    user-select: none;
  }
  .container {
    position: relative;
    width: 1587px;
    height: 1123px;
    margin: 20px auto;
    border: 1px solid #ccc;
    background: #eee;
  }
  .background-image {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }
  .form-container {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
  }
  .form-field {
    position: absolute;
    font-size: 18px;
    border: none;
    background-color: rgba(255, 255, 255, 0.7);
    resize: none;
    overflow: hidden;
    padding: 0;
    margin: 0;
    text-align: center;
    outline: none;
    scrollbar-width: none;  /* Firefox */
    -ms-overflow-style: none; /* IE 10+ */
  }
  .form-field::-webkit-scrollbar {
    display: none; /* Chrome, Safari, Opera */
  }

  .controls {
    width: 1123px;
    margin: 0 auto 30px auto;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .controls input[type="text"] {
    flex: 1;
    padding: 5px 8px;
    font-size: 18px;
    text-align: center;
  }
  .controls button {
    padding: 5px 12px;
    font-size: 14px;
  }
  .controls ::placeholder {
    color: lightsteelblue;
    opacity: 1;
    text-align: center;
  }
  textarea::placeholder {
    color: lightsteelblue;
    opacity: 1;
  }
</style>
</head>
<body>
  
<script>
const password = "儀理図";

const input = prompt("パスワードを入力してください");

if(input !== password){
  document.documentElement.innerHTML =
  "<h1 style='text-align:center;margin-top:20%;font-family:sans-serif;'>Access denied</h1>";
}
</script>

<div class="container" id="container">

<!-- 背景画像:A3サイズ（横1587px, 縦1123px） -->

  <img src="girigram.png" alt="背景画像" class="background-image" />
  <div class="form-container" id="formContainer"></div>
</div>

<div class="controls">
  <button id="resetBtn">リセット</button>
  <input type="file" id="importFile" style="display:none" accept=".grg" />
  <button id="importBtn">読み込み</button>
  <input type="text" id="filename" placeholder="名称未設定" />
  <button id="exportBtn">保存</button>
</div>

<script>

  const fieldsConfig = [
    { id: 'field1', top: 77, left: 87, width: 638, height: 24, rows: 1, placeholder: '強制される課題/外的動機（非定常化）' },
    { id: 'field2', top: 77, left: 851, width: 638, height: 24, rows: 1, placeholder: '課題の終了/外的変化' },
    { id: 'field3', top: 125, left: 87, width: 638, height: 24, rows: 1, placeholder: '差異から生じる摩擦/外的対立' },
    { id: 'field4', top: 125, left: 851, width: 638, height: 24, rows: 1, placeholder: '証明による摩擦の解消/インダクション' },
    { id: 'field5', top: 173, left: 87, width: 638, height: 24, rows: 1, placeholder: '認知から生じる責務/内的動機' },
    { id: 'field6', top: 173, left: 851, width: 638, height: 24, rows: 1, placeholder: '責務の完遂/定常化' },
    { id: 'field7', top: 221, left: 87, width: 638, height: 24, rows: 1, placeholder: '避けられない難題/内的対立' },
    { id: 'field8', top: 221, left: 851, width: 638, height: 24, rows: 1, placeholder: '変化を示す決断/内的変化の表出' },
    { id: 'field9', top: 269, left: 87, width: 638, height: 24, rows: 1, placeholder: '喪失による変転/ディセンチャント' },
    { id: 'field10', top: 269, left: 851, width: 638, height: 24, rows: 1, placeholder: '苦難からの離脱/マジックフライト' },
    { id: 'field11', top: 370, left: 87, width: 506, height: 46, rows: 1, placeholder: '矛盾や欠如/変化前の定常状態（↑非定常化）' },
    { id: 'field12', top: 370, left: 656, width: 269, height: 46, rows: 1, placeholder: 'プレミス/テーマ（*モチーフ）' },
    { id: 'field13', top: 370, left: 985, width: 506, height: 46, rows: 1, placeholder: '改変や補完/内的変化（↓定常化）' },
    { id: 'field14', top: 488, left: 82, width: 320, height: 46, rows: 1, placeholder: '錯誤/テーゼ' },
    { id: 'field15', top: 488, left: 446, width: 320, height: 46, rows: 1, placeholder: '認知/アンチテーゼ' },
    { id: 'field16', top: 488, left: 810, width: 320, height: 46, rows: 1, placeholder: '苦難/アウフヘーベン' },
    { id: 'field17', top: 488, left: 1175, width: 320, height: 46, rows: 1, placeholder: '選択/ジンテーゼ' },
    { id: 'field18', top: 611, left: 81, width: 140, height: 430, rows: 1, placeholder: '序説/惰性/矛盾' },
    { id: 'field19', top: 611, left: 263, width: 140, height: 430, rows: 1, placeholder: '契機/忌避/強制' },
    { id: 'field20', top: 611, left: 445, width: 140, height: 430, rows: 1, placeholder: '参入/差異/試行' },
    { id: 'field21', top: 611, left: 628, width: 140, height: 430, rows: 1, placeholder: '接近/証明/認知' },
    { id: 'field22', top: 611, left: 810, width: 140, height: 430, rows: 1, placeholder: '責務/喪失/現実' },
    { id: 'field23', top: 611, left: 992, width: 140, height: 430, rows: 1, placeholder: '苦難/変化/離脱' },
    { id: 'field24', top: 611, left: 1175, width: 140, height: 430, rows: 1, placeholder: '臨戦/難題/選択' },
    { id: 'field25', top: 611, left: 1357, width: 140, height: 430, rows: 1, placeholder: '終局(定常/後談)' },
  ];

  const formContainer = document.getElementById('formContainer');

  function createFormFields() {
    fieldsConfig.forEach(field => {
      const textarea = document.createElement('textarea');
      textarea.id = field.id;
      textarea.className = 'form-field';
      textarea.placeholder = field.placeholder;
      textarea.style.top = field.top + 'px';
      textarea.style.left = field.left + 'px';
      textarea.style.width = field.width + 'px';
      textarea.style.height = field.height + 'px';
      textarea.rows = field.rows;
      textarea.value = localStorage.getItem(field.id) || '';
      textarea.autocomplete = "off";

      textarea.addEventListener('input', () => {
        localStorage.setItem(field.id, textarea.value);
      });

      formContainer.appendChild(textarea);
    });
  }

  createFormFields();

  document.getElementById('resetBtn').addEventListener('click', () => {
    if (!confirm('すべての入力をリセットしますか？')) return;

    fieldsConfig.forEach(field => {
    const textarea = document.getElementById(field.id);
    textarea.value = '';
    localStorage.removeItem(field.id);
  });

    alert('リセットしました');
　});

  document.getElementById('importBtn').addEventListener('click', () => {
    document.getElementById('importFile').click();
  });

  document.getElementById('importFile').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const name = file.name.replace(/\.[^/.]+$/, "");
    document.getElementById("filename").value = name;
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const json = JSON.parse(evt.target.result);
        fieldsConfig.forEach(field => {
          if (json[field.id] !== undefined) {
            const textarea = document.getElementById(field.id);
            textarea.value = json[field.id];
            localStorage.setItem(field.id, json[field.id]);
          }
        });
        alert('読み込みに成功しました');
      } catch (err) {
        alert('読み込みに失敗しました');
      }
    };
    reader.readAsText(file);
  });

  document.getElementById('exportBtn').addEventListener('click', () => {
    const data = {};
    fieldsConfig.forEach(field => {
      const val = document.getElementById(field.id).value;
      data[field.id] = val;
    });
    const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
    const a = document.createElement('a');
    const filenameInput = document.getElementById('filename');
    let filename = filenameInput.value.trim();
    if (!filename) filename = '名称未設定.grg';
    else if (!filename.toLowerCase().endsWith('.json')) filename += '.grg';

    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    URL.revokeObjectURL(a.href);
  });

</script>

</body>
</html>
